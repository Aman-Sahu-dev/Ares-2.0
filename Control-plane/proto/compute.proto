syntax = "proto3";

option java_multiple_files = true;
option java_package = "ares.compute";
option java_outer_classname = "ComputeProto";

package compute;

service ComputeEngine {
  rpc ExecuteTask (TaskSpec) returns (TaskResult);
}

message TaskSpec {
  string runtime = 1;
  string entry_point = 2;
  bytes byte_code = 3;
  uint64 memory_limit_bytes = 4;
  uint32 cpu_shares = 5;
}

message TaskResult {
  string stdout = 1;
  string stderr = 2;
  int32 exit_code = 3;
  uint64 execution_time_ns = 4;
}
