syntax = "proto3";
package compute;

service ExecutionEngine {
    rpc ExecuteTask(TaskRequest) returns (TaskResponse);
}

message TaskSpec {
    string runtime = 1;
    string entry_point = 2;
    bytes byte_code = 3;
    int64 memory_limit_bytes = 4;
    int32 cpu_share = 4;
}
message TaskResult {
    bytes stdout_output =1;
    bytes stderr_output = 2;
    int64 execution_time_ns = 3;
    string exit_code = 4;
}
